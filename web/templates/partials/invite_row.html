{{ define "partials/invite_row.html" -}}
<tr id="invite-{{ .Token }}">
    <td>{{ .Email }}</td>
    <td>{{ .Role }}</td>
    <td>{{ .Status }}</td>
    <td><time datetime="{{ .CreatedAtISO }}">{{ .CreatedAt }}</time></td>
    <td><time datetime="{{ .ExpiresAtISO }}">{{ .ExpiresAt }}</time></td>
    <td>
        {{ if .CanResend }}
            <form method="post"
                  action="/admin/invites/{{ .Token }}/resend"
                  hx-post="/admin/invites/{{ .Token }}/resend"
                  hx-target="#invite-{{ .Token }}"
                  hx-swap="outerHTML"
                  style="display:inline">
                <button type="submit" class="secondary">Resend</button>
            </form>
        {{ end }}
        {{ if .CanRevoke }}
            <form method="post"
                  action="/admin/invites/{{ .Token }}/revoke"
                  hx-post="/admin/invites/{{ .Token }}/revoke"
                  hx-target="#invite-{{ .Token }}"
                  hx-swap="outerHTML"
                  hx-confirm="Revoke invite for {{ .Email }}?"
                  style="display:inline">
                <button type="submit" class="contrast">Revoke</button>
            </form>
        {{ end }}
        {{ if .CanCopy }}
            <button type="button" class="secondary"
                    data-invite-url="{{ .Link }}"
                    aria-label="Copy invite link">Copy invite link</button>
        {{ end }}
    </td>
</tr>
{{- end }}
