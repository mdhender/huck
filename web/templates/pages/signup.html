{{ define "title" }}huck — create your account{{ end }}

{{ define "content" }}
<header>
    <h1>Create your account</h1>
</header>

<article>
    {{ if .Error }}
        <p><strong>{{ .Error }}</strong></p>
    {{ end }}
    <form method="post" action="/signup/{{ .Token }}">
        <input type="hidden" name="_csrf" value="{{ .CSRF }}">
        <label>
            Email
            <input type="email" name="email" value="{{ .Email }}" readonly>
        </label>
        <label>
            Handle
            <input type="text" name="handle" autocomplete="username" required autofocus
                   value="{{ .Handle }}">
        </label>
        <label>
            Password
            <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <button type="submit">Create account</button>
    </form>
    <p><small>Your handle must be 3–32 characters, starting with a lowercase letter.</small></p>
    <p><small>Your password must be 12–128 characters.</small></p>
</article>
{{ end }}
