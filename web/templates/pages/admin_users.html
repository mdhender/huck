{{ define "title" }}huck — admin users{{ end }}

{{ define "content" }}
<header>
    <nav>
        <ul>
            <li><strong>huck</strong></li>
            <li>admin</li>
        </ul>
        <ul>
            <li>signed in as <em>{{ .Handle }}</em></li>
            <li><a href="/admin/invites">Invites</a></li>
            <li><a href="/">Home</a></li>
            <li>
                <form class="inline" method="post" action="/logout">
                    <button type="submit" class="secondary">Sign out</button>
                </form>
            </li>
        </ul>
    </nav>
    <h1>Users</h1>
</header>

<article>
    {{ if .Notice }}
        <p><em>{{ .Notice }}</em></p>
    {{ end }}
    {{ if .Rows }}
        <figure>
        <table>
            <thead>
                <tr>
                    <th scope="col">Handle</th>
                    <th scope="col">Email</th>
                    <th scope="col">Admin</th>
                    <th scope="col">Created</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{ range .Rows }}
                    <tr>
                        <td>{{ .Handle }}{{ if .IsSelf }} <small>(you)</small>{{ end }}</td>
                        <td>{{ .Email }}</td>
                        <td>{{ if .IsAdmin }}yes{{ else }}no{{ end }}</td>
                        <td><time datetime="{{ .CreatedAtISO }}">{{ .CreatedAt }}</time></td>
                        <td>
                            <a href="/admin/users/{{ .ID }}" role="button" class="secondary">View</a>
                            <a href="/admin/users/{{ .ID }}/edit" role="button" class="secondary">Edit</a>
                        </td>
                    </tr>
                {{ end }}
            </tbody>
        </table>
        </figure>
    {{ else }}
        <p><em>No users yet.</em></p>
    {{ end }}
</article>
{{ end }}
