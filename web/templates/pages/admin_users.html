{{ define "title" }}huck — admin users{{ end }}

{{ define "content" }}
<header class="huck-page-header">
    <h1>Users</h1>
</header>

<article>
    {{ if .Notice }}
        <p><em>{{ .Notice }}</em></p>
    {{ end }}
    {{ if .Rows }}
        <figure>
        <table>
            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Role</th>
                    <th scope="col">Status</th>
                    <th scope="col">Last login</th>
                    <th scope="col">Created</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{ range .Rows }}
                    <tr>
                        <td>{{ .Handle }}{{ if .IsSelf }} <small>(you)</small>{{ end }}</td>
                        <td>{{ .Email }}</td>
                        <td>{{ .Role }}</td>
                        <td>{{ .Status }}</td>
                        <td>{{ if .LastLoginISO }}<time datetime="{{ .LastLoginISO }}">{{ .LastLogin }}</time>{{ else }}—{{ end }}</td>
                        <td><time datetime="{{ .CreatedAtISO }}">{{ .CreatedAt }}</time></td>
                        <td>
                            <a href="/admin/users/{{ .ID }}" role="button" class="secondary">View</a>
                            <a href="/admin/users/{{ .ID }}/edit" role="button" class="secondary">Edit</a>
                        </td>
                    </tr>
                {{ end }}
            </tbody>
        </table>
        </figure>
    {{ else }}
        <p><em>No users yet.</em></p>
    {{ end }}
</article>
{{ end }}
