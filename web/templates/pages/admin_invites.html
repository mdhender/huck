{{ define "title" }}huck — admin invitations{{ end }}

{{ define "content" }}
<header class="huck-page-header">
    <h1>Invitations</h1>
</header>

<article>
    {{ if .Error }}
        <p><strong>{{ .Error }}</strong></p>
    {{ end }}
    {{ if .Notice }}
        <p><em>{{ .Notice }}</em></p>
    {{ end }}
    <form method="post" action="/admin/invites" class="huck-form-stack">
        <label>
            Email
            <input type="email" name="email" required autofocus
                   value="{{ .FormEmail }}"
                   placeholder="newuser@example.com">
        </label>
        <fieldset>
            <legend>Role</legend>
            <label>
                <input type="radio" name="role" value="user"
                       {{ if not (eq .FormRole "admin") }}checked{{ end }}>
                User
            </label>
            <label>
                <input type="radio" name="role" value="admin"
                       {{ if eq .FormRole "admin" }}checked{{ end }}>
                Admin
            </label>
        </fieldset>
        <button type="submit">Send invite</button>
    </form>
</article>

<article>
    <h2>Existing invites</h2>
    {{ if .Rows }}
        <figure>
        <table>
            <thead>
                <tr>
                    <th scope="col">Email</th>
                    <th scope="col">Role</th>
                    <th scope="col">Status</th>
                    <th scope="col">Sent</th>
                    <th scope="col">Expires</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{ range .Rows }}
                    {{ template "partials/invite_row.html" . }}
                {{ end }}
            </tbody>
        </table>
        </figure>
    {{ else }}
        <p><em>No invites yet. Send one above to get started.</em></p>
    {{ end }}
</article>
{{ end }}
