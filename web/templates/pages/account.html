{{ define "title" }}huck — account{{ end }}

{{ define "content" }}
<header class="huck-page-header">
    <h1>Account</h1>
</header>

<article>
    <dl>
        <dt>Handle</dt>
        <dd>{{ .User.Handle }}</dd>
        <dt>Email</dt>
        <dd>{{ .User.Email }}</dd>
        <dt>Admin</dt>
        <dd>{{ if .User.IsAdmin }}yes{{ else }}no{{ end }}</dd>
        <dt>Created</dt>
        <dd><time datetime="{{ .CreatedAtISO }}">{{ .CreatedAt }}</time></dd>
        <dt>Updated</dt>
        <dd><time datetime="{{ .UpdatedAtISO }}">{{ .UpdatedAt }}</time></dd>
    </dl>
</article>
{{ end }}
