# Air - Live reload for Go apps
# Install: go install github.com/air-verse/air@latest
# Run: air

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./dist/local/huck ./cmd/huck"
  bin = "./dist/local/huck"
  args_bin = ["serve", "--addr", ":9797", "--base-url", "http://localhost:9797"]
  delay = 1000
  include_dir = ["cmd", "internal", "migrations", "web"]
  include_ext = ["go", "html", "sql"]
  exclude_regex = ["_test\\.go$"]
  kill_delay = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
